<head>

<title>xRBEU Catalog Viewer</title>
<style>
  :root {
    --bg: #fafaf7; --panel: #ffffff; --ink: #1a1a1a; --muted: #6b6b6b;
    --line: #e5e3dd; --accent: #6b3e1f;
    --tier-S: #d4af37; --tier-A: #4a7c4a; --tier-B: #5b8def;
    --tier-C: #c9a36b; --tier-D: #a86a4a; --tier-F: #9b3838;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.4; font-size: 14px; }
  header { background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 16px 24px; position: sticky; top: 0; z-index: 10; }
  h1 { margin: 0 0 4px 0; font-size: 20px; }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="text"] { padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px;
    background: var(--bg); font-size: 14px; min-width: 160px; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 4px 10px; border: 1px solid var(--line); border-radius: 16px;
    cursor: pointer; user-select: none; font-size: 12px; background: var(--panel); transition: all 0.15s; }
  .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  .stats { display: flex; gap: 20px; padding: 12px 24px; background: var(--panel);
    border-bottom: 1px solid var(--line); font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .stat strong { color: var(--ink); font-size: 14px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: middle; }
  th { background: #f4f2ec; font-weight: 600; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.5px; cursor: pointer; position: sticky; top: 0; z-index: 1; user-select: none; }
  th:hover { background: #ebe8df; }
  th.img-th { width: 52px; min-width: 52px; cursor: default; padding: 4px 8px; text-align: center; }
  th.img-th:hover { background: #f4f2ec; }
  th.sorted { color: var(--accent); }
  th.sorted::after { content: ""; }
  th.sorted.asc::after { content: " ▲"; font-size: 10px; }
  th.sorted.desc::after { content: " ▼"; font-size: 10px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.center, th.center { text-align: center; }
  tbody tr:hover { background: #faf7ee; }
  .tier-badge { display: inline-block; min-width: 22px; padding: 2px 8px; border-radius: 4px;
    color: white; font-weight: 700; text-align: center; font-size: 12px; }
  .tier-S { background: var(--tier-S); color: #3a2d00; }
  .tier-A { background: var(--tier-A); }
  .tier-B { background: var(--tier-B); }
  .tier-C { background: var(--tier-C); }
  .tier-D { background: var(--tier-D); }
  .tier-F { background: var(--tier-F); }
  .bbb { font-size: 11px; padding: 2px 6px; border-radius: 3px; background: #f0ede5; color: var(--muted); }
  .bbb-Bottle { background: #d9efd9; color: #1f5c1f; }
  .bbb-Bar { background: #fff2cc; color: #6b5208; }
  .bbb-Bust { background: #f9d4d4; color: #7c1e1e; }
  .name { font-weight: 500; }
  .name .notes { color: var(--muted); font-size: 11px; font-style: italic; margin-top: 2px; }
  .empty { padding: 32px; text-align: center; color: var(--muted); }
  footer { padding: 16px 24px; color: var(--muted); font-size: 11px; text-align: center;
    border-top: 1px solid var(--line); }
  td.img-td { width: 52px; min-width: 52px; padding: 4px 8px; text-align: center; }
  .thumb { width: 36px; height: 54px; object-fit: contain; cursor: zoom-in;
    display: block; margin: 0 auto; border-radius: 3px; }
  .no-img { display: block; width: 36px; height: 54px; margin: 0 auto;

  #modal { display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.78); align-items: center; justify-content: center; cursor: zoom-out; }
  #modal img { max-width: 88vw; max-height: 88vh; object-fit: contain;
    border-radius: 6px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); cursor: default; }
  #modal-close { position: absolute; top: 14px; right: 22px; color: white; font-size: 30px;
    cursor: pointer; line-height: 1; background: none; border: none; padding: 0; }
</style>

  { key: "rating", label: "Rating", cls: "num",      fmt: function(v) { return String(Math.round(v)); } },
  { key: "price",  label: "Price",  cls: "num",      fmt: function(v) { return '$' + v.toFixed(2); } },
  { key: "fair",   label: "Fair $", cls: "num",      fmt: function(v) { return '$' + v.toFixed(2); } },
  { key: "rbeu",   label: "xRBEU",  cls: "num",      fmt: function(v) { return '<strong>' + v.toFixed(2) + '</strong>'; } },
  { key: "bbb",    label: "BBB",    cls: "center",   fmt: function(v) { return v ? '<span class="bbb bbb-' + v + '">' + v + '</span>' : '—'; } },
];
const TIERS = ["S","A","B","C","D","F"];
const BBB_OPTS = ["Bottle","Bar","Bust"];
const STORAGE_KEY = "rbeu_catalog_filters_v1";
const stored = (function() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; } })();
const state = { search: stored.search || "", tiers: new Set(stored.tiers || []),
  bbbs: new Set(stored.bbbs || []), sortKey: stored.sortKey || "rank", sortDir: stored.sortDir || "asc" };
function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ search: state.search,
    tiers: Array.from(state.tiers), bbbs: Array.from(state.bbbs),
    sortKey: state.sortKey, sortDir: state.sortDir })); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':'&quot;',"'": "&#39;"}[c]; }); }
function imgCell(r) {
  if (r.img) {
    var isShopify = r.img.indexOf('cdn/shop/') !== -1;
    var src = isShopify ? r.img + '&width=80' : r.img;
    var full = isShopify ? r.img + '&width=600' : r.img;
    return '<img src="' + src + '" loading="lazy" decoding="async" class="thumb" data-full="' + full + '" alt="">'; }
  return '<span class="no-img"></span>'; }
function renderHeader() {
  const row = document.getElementById("header-row");
  let html = '<th class="img-th"></th>';
  html += COLUMNS.map(function(c) {
    const sorted = state.sortKey === c.key;
    const cls = (c.cls || "") + (sorted ? " sorted " + state.sortDir : "");
    return '<th data-key="' + c.key + '" class="' + cls.trim() + '">' + c.label + '</th>'; }).join("");
  row.innerHTML = html;
  row.querySelectorAll("th[data-key]").forEach(function(th) {
    th.addEventListener("click", function() {
      const key = th.dataset.key;
      if (state.sortKey === key) { state.sortDir = state.sortDir === "asc" ? "desc" : "asc"; }
      else { state.sortKey = key; state.sortDir = (key==="name"||key==="tier"||key==="bbb") ? "asc" : "desc"; }
      persist(); render(); }); }); }
function renderChips() {
  const tierEl = document.getElementById("tier-chips");
  tierEl.innerHTML = TIERS.map(function(t) {
    return '<span class="chip ' + (state.tiers.has(t) ? "active" : "") + '" data-tier="' + t + '">' + t + '</span>'; }).join("");
  tierEl.querySelectorAll(".chip").forEach(function(el) {
    el.addEventListener("click", function() {
      const t = el.dataset.tier; if (state.tiers.has(t)) { state.tiers.delete(t); } else { state.tiers.add(t); }
      persist(); render(); }); });
  const bbbEl = document.getElementById("bbb-chips");
  bbbEl.innerHTML = BBB_OPTS.map(function(b) {
    return '<span class="chip ' + (state.bbbs.has(b) ? "active" : "") + '" data-bbb="' + b + '">' + b + '</span>'; }).join("");
  bbbEl.querySelectorAll(".chip").forEach(function(el) {
    el.addEventListener("click", function() {
      const b = el.dataset.bbb; if (state.bbbs.has(b)) { state.bbbs.delete(b); } else { state.bbbs.add(b); }
      persist(); render(); }); }); }
function filtered() {
  const q = state.search.trim().toLowerCase();
  return DATA.rows.filter(function(r) {
    if (state.tiers.size > 0 && !state.tiers.has(r.tier)) return false;
    if (state.bbbs.size > 0 && !state.bbbs.has(r.bbb)) return false;
    if (q && !r.name.toLowerCase().includes(q) && !(r.notes||"").toLowerCase().includes(q)) return false;
    return true; }); }
function sortedRows(rows) {
  const k = state.sortKey; const d = state.sortDir === "asc" ? 1 : -1;
  const tierRank = {S:0,A:1,B:2,C:3,D:4,F:5};
  return rows.slice().sort(function(a,b) {
    let av = a[k], bv = b[k];
    if (k === "tier") { av = tierRank[av]; bv = tierRank[bv]; }
    if (typeof av === "string") return av.localeCompare(bv) * d;
    return ((av||0)-(bv||0))*d; }); }
function renderStats(visible) {
  const el = document.getElementById("stats");
  if (visible.length === 0) { el.innerHTML = '<div class="stat">No matches</div>'; return; }
  const counts = TIERS.map(function(t) { return {t:t, n:visible.filter(function(r){return r.tier===t;}).length}; });
  const vals = visible.map(function(r){return r.rbeu;}).sort(function(a,b){return a-b;});
  const median = vals.length%2 ? vals[(vals.length-1)/2] : (vals[vals.length/2-1]+vals[vals.length/2])/2;
  const avgPrice = visible.reduce(function(s,r){return s+r.price;},0)/visible.length;
  el.innerHTML = '<div class="stat"><strong>' + visible.length + '</strong> shown / ' + DATA.rows.length + ' total</div>' +
    '<div class="stat">Median xRBEU: <strong>' + median.toFixed(2) + '</strong></div>' +
    '<div class="stat">Avg price: <strong>$' + avgPrice.toFixed(0) + '</strong></div>' +
    counts.map(function(c){return '<div class="stat">'+c.t+': <strong>'+c.n+'</strong></div>';}).join(""); }
function renderTable(visible) {
  const tbody = document.getElementById("tbody");
  if (visible.length === 0) {
    tbody.innerHTML = '<tr><td colspan="' + (COLUMNS.length+1) + '" class="empty">No whiskeys match your filters.</td></tr>'; return; }
  tbody.innerHTML = visible.map(function(r) {
    return '<tr><td class="img-td">' + imgCell(r) + '</td>' +
      COLUMNS.map(function(c) {
        return '<td class="' + (c.cls||"") + '">' + c.fmt(r[c.key],r) + '</td>'; }).join("") + '</tr>'; }).join(""); }
function render() { renderHeader(); renderChips(); const visible=sortedRows(filtered()); renderStats(visible); renderTable(visible); }
document.getElementById("tbody").addEventListener("click", function(e) {
  const img = e.target.closest(".thumb"); if (!img) return;
  document.getElementById("modal-img").src = img.getAttribute("data-full");
  document.getElementById("modal").style.display = "flex"; });
document.getElementById("modal").addEventListener("click", function() {
  document.getElementById("modal").style.display = "none"; });
document.getElementById("search").value = state.search;
document.getElementById("search").addEventListener("input", function(e) { state.search=e.target.value; persist(); render(); });
document.getElementById("reset").addEventListener("click", function() {
  state.search=""; state.tiers.clear(); state.bbbs.clear();
  state.sortKey="rank"; state.sortDir="asc";
  document.getElementById("search").value=""; persist(); render(); });
document.getElementById("anchor-info").textContent =
  "Anchors: WT R" + DATA.anchors.wt_rating + " = $" + DATA.anchors.wt_price.toFixed(2) + " · " +
  "Top R" + DATA.anchors.top_rating + " = $" + DATA.anchors.top_price.toFixed(2) + " · " +
  "k = " + DATA.anchors.k;
render();
</script>
</body>
